name: Tender Monitor
on:
  schedule:
    - cron: "*/15 3-18 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [trigger, digest, deadman]
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Monitor
        if: github.event.action != 'digest' && github.event.action != 'deadman'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python monitor.py
      - name: Run Digest
        if: github.event.action == 'digest'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python digest.py
      - name: Run Dead-Man's Switch Check
        if: github.event.action == 'deadman'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python deadman_switch.py
      - name: Commit seen files
        if: github.event.action != 'digest' && github.event.action != 'deadman'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add seen_tenders.json
          git diff --staged --quiet && exit 0
          git commit -m "Update seen files"
          git push
